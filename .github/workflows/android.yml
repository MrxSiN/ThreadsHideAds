name: Android CI & Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"

  pull_request:
    branches:
      - master

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      # Normal master push or pull request
      - name: Build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew assembleDebug --no-daemon

      # Only runs when a v* tag is pushed
      - name: Build release APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew assembleRelease --no-daemon

      - name: List generated release files
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: find app/build/outputs/apk/release -type f -maxdepth 1 -print

      - name: Sign release APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Verify signed APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "Signed APK: ${{ steps.sign_app.outputs.signedReleaseFile }}"

          if [ ! -f "${{ steps.sign_app.outputs.signedReleaseFile }}" ]; then
            echo "Signed APK was not generated"
            exit 1
          fi

      - name: Upload signed APK to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          fail_on_unmatched_files: true
          generate_release_notes: true